# Fabrica configuration template
# Copy to fabrica.yaml and edit for your environment.
#
# See Fabrica_PRODUCT_SPEC.md for details on each section.

cloud:
  provider: aws               # Currently only "aws" is supported
  aws:
    region: us-east-1         # AWS region for all resources
    profile: ""               # Named AWS profile (optional; defaults to SDK credential chain)
    accountId: ""             # Auto-detected on first `fabrica setup`; leave empty initially
    tags: {}                  # Extra tags merged with standard Fabrica tags on every resource

state:
  bucket: ""                  # Auto-named `fabrica-state-<account-id>` on setup; override if desired
  table: fabrica-state-lock   # DynamoDB table name for distributed locks
  kmsKeyId: ""                # KMS key ARN for SSE-KMS encryption (optional; defaults to SSE-S3)

# Module configuration sections
perforce: {}
horde: {}

# CI: a CodeBuild project that orchestrates Horde BuildGraph jobs.
# All fields are optional — defaults shown.
ci:
  projectName: ""             # CodeBuild project name (default "fabrica-ci")
  computeType: ""             # CodeBuild compute type (default "BUILD_GENERAL1_SMALL")
  image: ""                   # Build image (default "aws/codebuild/amazonlinux2-x86_64-standard:5.0")
  buildTimeout: 0             # Build timeout in minutes (default 60)

cost: {}
