name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9
        with:
          version: v2.10.1

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  build:
    name: Build
    strategy:
      # Full 3-OS matrix on push to main; PRs skip macOS (10x minutes on the
      # free tier) — Linux + Windows already cover the cross-platform risk.
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - run: go build -v ./...
      - run: go vet ./...

  test:
    name: Test
    strategy:
      # Full 3-OS matrix on push to main; PRs skip macOS to conserve minutes.
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    # id-token lets the Linux job authenticate the Codecov upload via OIDC,
    # so no CODECOV_TOKEN secret is stored in the repo.
    permissions:
      contents: read
      id-token: write
    steps:
      # fetch-depth: 0 so Codecov can walk git history for path mapping and so
      # parent/base SHAs exist when the App compares PR head vs main (avoids
      # "Missing base commit" / unusable reports on shallow clones).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install gotestsum (Linux)
        if: runner.os == 'Linux'
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests with race detection and coverage (Linux)
        if: runner.os == 'Linux'
        # gotestsum runs the suite once, prints readable output, and writes a
        # JUnit XML for Codecov Test Analytics. Flags after -- go to `go test`.
        run: |
          gotestsum --junitfile junit.xml --format pkgname -- \
            -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Run tests with race detection (macOS)
        if: runner.os == 'macOS'
        run: go test -race -v ./...
      - name: Run tests with race detection (Windows)
        if: runner.os == 'Windows'
        run: go test -race -v ./...
      - name: Display coverage summary
        if: runner.os == 'Linux'
        run: go tool cover -func=coverage.out
      # Codecov standard (fabrica → roll out to sister repos):
      #   - codecov-action@v7 only (no separate test-results-action)
      #   - OIDC (optional CODECOV_TOKEN secret if OIDC alone is insufficient)
      #   - Explicit override_* so push-to-main uploads are tagged with the real
      #     SHA/branch (action only auto-fills those for pull_request events;
      #     empty CC_SHA on push was leaving main without a usable base report).
      #   - Do NOT add codecov/patch to ruleset required checks (soft gate).
      - name: Upload coverage to Codecov
        # Skip fork PRs: OIDC tokens aren't issued to forked-repo runs.
        if: runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          # Prefer OIDC; if CODECOV_TOKEN is set it is still passed for CLI
          # create-commit on protected branches when OIDC JWT is not enough.
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          use_pypi: true
          files: ./coverage.out
          slug: jpvelasco/fabrica
          # PR head SHA on pull_request; otherwise the push SHA (main).
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.head_ref || github.ref_name }}
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        # Test Analytics (failed-test / flaky reporting). Same Action as coverage
        # with report_type: test_results — replaces deprecated test-results-action.
        if: ${{ !cancelled() && runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          use_pypi: true
          report_type: test_results
          files: ./junit.xml
          slug: jpvelasco/fabrica
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.head_ref || github.ref_name }}
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: false

  goreleaser:
    name: Release build (snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: "24"
      # Build-only: verifies .goreleaser.yaml compiles all platforms. NEVER
      # publishes (no `release`, no tag). Catches config breakage on PRs.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7
        with:
          args: build --snapshot --clean
      - name: Smoke-test the built linux binary
        # Exec the freshly built native binary to prove it runs + the version
        # ldflags resolved (not the `dev`/`unknown` fallbacks). The runner is
        # linux/amd64, so glob that build output.
        run: |
          BIN=$(find dist -type f -name fabrica -path '*linux_amd64*' | head -1)
          test -n "$BIN" || { echo "no linux/amd64 fabrica binary in dist/"; exit 1; }
          chmod +x "$BIN"
          OUT=$("$BIN" version)
          echo "$OUT"
          # snapshot builds inject a version like "0.1.0-SNAPSHOT-<sha>"; the
          # binary must NOT show the un-injected "dev" fallback.
          echo "$OUT" | grep -q "Fabrica dev" && { echo "version ldflags did not resolve (still 'dev')"; exit 1; }
          echo "smoke test OK"
      - name: npm shim tests
        working-directory: npm
        run: node --test

  # Optional checks (informational for now — not required by protect-main ruleset).
  # Pattern mirrors Ludus (Windows lint) and Juggernaut (gosec / fs scan).

  lint-windows:
    name: Lint (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9
        with:
          version: v2.10.1

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run gosec
        # Exclusions (mirrors .golangci.yml rationale):
        #   G204 — command execution audit (AST pattern) — noisy for CLI subprocess calls
        #   G304 — file inclusion via variable — intentional for config file reads
        #   G702 — command injection taint analysis — noisy for CLI tool subprocess invocations
        #   G703 — path traversal taint analysis — noisy for config/state file path resolution
        # Remaining findings use #nosec with per-line rationale.
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -exclude=G204,G304,G702,G703 ./...

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
