name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9
        with:
          version: v2.10.1

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
      - run: go build -v ./...
      - run: go vet ./...

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # id-token lets the Linux job authenticate the Codecov upload via OIDC,
    # so no CODECOV_TOKEN secret is stored in the repo.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
      - name: Install gotestsum (Linux)
        if: runner.os == 'Linux'
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests with race detection and coverage (Linux)
        if: runner.os == 'Linux'
        # gotestsum runs the suite once, prints readable output, and writes a
        # JUnit XML for Codecov Test Analytics. Flags after -- go to `go test`.
        run: |
          gotestsum --junitfile junit.xml --format pkgname -- \
            -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Run tests with race detection (macOS)
        if: runner.os == 'macOS'
        run: go test -race -v ./...
      - name: Run tests with race detection (Windows)
        if: runner.os == 'Windows'
        run: go test -race -v ./...
      - name: Display coverage summary
        if: runner.os == 'Linux'
        run: go tool cover -func=coverage.out
      - name: Upload coverage to Codecov
        # Skip on PRs from forks: OIDC tokens aren't issued to forked-repo runs,
        # and with no CODECOV_TOKEN fallback the tokenless upload would fail a
        # private-repo PR (fail_ci_if_error is true). Always runs on push to main.
        if: runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          use_oidc: true
          files: ./coverage.out
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        # Runs even when tests fail (that's the point of Test Analytics: failed-
        # test reporting + flaky detection). Same OIDC + fork guard as coverage.
        if: ${{ !cancelled() && runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3  # v1.2.1
        with:
          use_oidc: true
          files: ./junit.xml
